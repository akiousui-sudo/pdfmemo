<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PDFメモ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: #52565c;
    display: flex; flex-direction: column;
  }

  /* ---- ツールバー ---- */
  #toolbar {
    background: #2c2f33; color: #fff;
    display: flex; align-items: center; flex-wrap: wrap;
    gap: 6px; padding: 8px 10px;
    padding-top: calc(8px + env(safe-area-inset-top));
    user-select: none; -webkit-user-select: none;
    flex-shrink: 0; z-index: 10;
  }
  .tb-group { display: flex; align-items: center; gap: 4px;
    background: #3a3e44; border-radius: 10px; padding: 4px; }
  .tb-btn {
    border: none; background: transparent; color: #eee;
    font-size: 15px; font-family: inherit;
    min-width: 42px; height: 40px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; padding: 0 10px; white-space: nowrap;
  }
  .tb-btn:active { background: #55595f; }
  .tb-btn.active { background: #0a84ff; color: #fff; }
  .tb-btn:disabled { opacity: .35; }

  .color-btn { min-width: 40px; padding: 0; }
  .color-dot { width: 24px; height: 24px; border-radius: 50%; border: 2px solid rgba(255,255,255,.7); }
  .color-btn.active { background: #55595f; }
  .color-btn.active .color-dot { border-color: #0a84ff; box-shadow: 0 0 0 2px #0a84ff; }

  .width-btn { min-width: 40px; padding: 0; }
  .width-dot { background: #fff; border-radius: 50%; }
  .width-btn.active { background: #0a84ff; }

  #pageInfo { font-size: 14px; color: #ccc; padding: 0 6px; min-width: 64px; text-align: center; }
  #fileName { font-size: 13px; color: #aaa; max-width: 180px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; }
  .spacer { flex: 1; }

  #fingerLabel { display: flex; align-items: center; gap: 5px; font-size: 13px;
    color: #ccc; padding: 0 8px; cursor: pointer; }
  #fingerLabel input { width: 18px; height: 18px; }

  /* ---- 表示エリア ---- */
  #viewer {
    flex: 1; overflow-y: auto; overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    display: flex; flex-direction: column; align-items: center;
    padding: 12px 0 60px;
  }
  .page-wrap {
    position: relative; margin: 0 auto 14px;
    box-shadow: 0 2px 10px rgba(0,0,0,.4);
    background: #fff; flex-shrink: 0;
  }
  .page-wrap canvas { display: block; }
  .ann-canvas {
    position: absolute; left: 0; top: 0;
    touch-action: pan-y pinch-zoom;
  }
  .ann-canvas.finger-draw { touch-action: none; }

  /* ---- 初期画面 ---- */
  #welcome {
    color: #ddd; text-align: center; margin-top: 12vh; padding: 20px;
  }
  #welcome h1 { font-size: 26px; margin-bottom: 14px; font-weight: 600; }
  #welcome p { font-size: 15px; line-height: 1.9; color: #bbb; }
  #bigOpen {
    margin-top: 26px; font-size: 18px; font-family: inherit;
    background: #0a84ff; color: #fff; border: none;
    padding: 16px 42px; border-radius: 14px; cursor: pointer;
  }

  #toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,.85); color: #fff; font-size: 15px;
    padding: 12px 24px; border-radius: 12px; z-index: 100;
    opacity: 0; transition: opacity .3s; pointer-events: none;
    max-width: 85vw; text-align: center;
  }
  #toast.show { opacity: 1; }

  /* ---- 保存方法の選択ダイアログ ---- */
  #saveModal {
    position: fixed; inset: 0; background: rgba(0,0,0,.5);
    display: none; align-items: center; justify-content: center; z-index: 50;
  }
  #saveModal.show { display: flex; }
  #saveBox {
    background: #fff; border-radius: 16px; padding: 22px;
    width: min(460px, 90vw); box-shadow: 0 8px 30px rgba(0,0,0,.35);
  }
  #saveBox h2 { font-size: 18px; margin-bottom: 14px; color: #222; }
  .save-opt {
    display: block; width: 100%; text-align: left; font-family: inherit;
    border: 1px solid #ccc; background: #f7f7f9; border-radius: 12px;
    padding: 12px 14px; margin-bottom: 10px; cursor: pointer; font-size: 14px;
  }
  .save-opt b { display: block; font-size: 16px; margin-bottom: 4px; color: #111; }
  .save-opt span { color: #555; line-height: 1.5; }
  .save-opt:active { background: #e2e2ea; }
</style>
</head>
<body>

<div id="toolbar">
  <div class="tb-group">
    <button class="tb-btn" id="openBtn">📂 開く</button>
  </div>

  <div class="tb-group" id="modeGroup">
    <button class="tb-btn mode-btn active" data-mode="free" title="フリーハンド">✏️自由</button>
    <button class="tb-btn mode-btn" data-mode="line" title="A点からB点まで直線">╱直線</button>
    <button class="tb-btn mode-btn" data-mode="rect" title="A点からB点を対角とする四角で塗りつぶし">▰四角</button>
  </div>

  <div class="tb-group" id="colorGroup">
    <button class="tb-btn color-btn active" data-color="#111111" title="黒">
      <span class="color-dot" style="background:#111"></span></button>
    <button class="tb-btn color-btn" data-color="#e02020" title="赤">
      <span class="color-dot" style="background:#e02020"></span></button>
    <button class="tb-btn color-btn" data-color="#1560e0" title="青">
      <span class="color-dot" style="background:#1560e0"></span></button>
    <button class="tb-btn" id="eraserBtn" title="消しゴム">🧹</button>
  </div>

  <div class="tb-group" id="widthGroup">
    <button class="tb-btn width-btn" data-width="1.5" title="細">
      <span class="width-dot" style="width:5px;height:5px"></span></button>
    <button class="tb-btn width-btn active" data-width="3" title="中">
      <span class="width-dot" style="width:9px;height:9px"></span></button>
    <button class="tb-btn width-btn" data-width="6" title="太">
      <span class="width-dot" style="width:15px;height:15px"></span></button>
  </div>

  <div class="tb-group">
    <button class="tb-btn" id="undoBtn" title="元に戻す">↩︎</button>
    <button class="tb-btn" id="clearBtn" title="このページのメモを全部消す">🗑</button>
  </div>

  <div class="tb-group">
    <button class="tb-btn" id="zoomOut">−</button>
    <button class="tb-btn" id="zoomIn">＋</button>
  </div>

  <span id="pageInfo"></span>
  <label id="fingerLabel"><input type="checkbox" id="fingerDraw">指でも書く</label>

  <span class="spacer"></span>
  <span id="fileName"></span>
  <div class="tb-group">
    <button class="tb-btn" id="saveBtn" style="background:#0a84ff">💾 保存</button>
  </div>
</div>

<div id="viewer">
  <div id="welcome">
    <h1>PDFメモ</h1>
    <p>PDFを開いて、Apple Pencilで直接メモが書けます。<br>
    指ではスクロール、ペンで書き込み。<br>
    「💾 保存」で、メモ入りのPDFを<b>別ファイル（日時付きの名前）</b>として保存します。<br>
    元のPDFは変更されません。iPadでは共有シートから「ファイルに保存」を選んでください。</p>
    <button id="bigOpen">📂 PDFを開く</button>
  </div>
</div>

<input type="file" id="fileInput" accept="application/pdf,.pdf" style="display:none">

<div id="saveModal">
  <div id="saveBox">
    <h2>保存方法を選んでください</h2>
    <button class="save-opt" id="saveNormal">
      <b>📝 通常保存</b>
      <span>メモを重ねて保存します。文字のコピー・検索はそのまま使えますが、塗りつぶした下の文字データはPDFの中に残ります。</span>
    </button>
    <button class="save-opt" id="saveFlat">
      <b>🔒 完全塗りつぶし保存</b>
      <span>全ページを画像に変換して保存します。塗りつぶした情報は完全に消えるので、個人情報を隠して外部に渡す場合はこちら。（文字のコピー・検索は不可、ファイルサイズは大きめ）</span>
    </button>
    <button class="save-opt" id="saveCancel" style="text-align:center"><b style="margin:0">キャンセル</b></button>
  </div>
</div>

<div id="toast"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const viewer = document.getElementById('viewer');
const fileInput = document.getElementById('fileInput');
const pageInfo = document.getElementById('pageInfo');

let pdfDoc = null;
let originalBytes = null;   // pdf-lib用に元データを保持
let currentFile = null;
let scale = 1;
let pages = [];             // {num, baseW, baseH, wrap, pdfCanvas, annCanvas, strokes[]}
let undoStack = [];         // {page, stroke}
let tool = { eraser: false, color: '#111111', width: 3, mode: 'free' }; // mode: free=自由 line=直線 rect=四角
let fingerDraw = false;

/* ============ ユーティリティ ============ */
function toast(msg, ms = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), ms);
}

function storageKey() {
  return currentFile ? `pdfmemo:${currentFile.name}:${currentFile.size}` : null;
}

let saveTimer = null;
function autoSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const key = storageKey();
    if (!key) return;
    try {
      const data = pages.map(p => p.strokes.map(s => ({
        e: s.eraser ? 1 : 0, c: s.color, w: s.width, t: s.type || 'free',
        p: s.points.map(pt => [Math.round(pt[0] * 10) / 10, Math.round(pt[1] * 10) / 10])
      })));
      localStorage.setItem(key, JSON.stringify(data));
    } catch (e) { /* 容量オーバー時は自動保存だけ諦める */ }
  }, 800);
}

function restoreStrokes() {
  const key = storageKey();
  if (!key) return false;
  const raw = localStorage.getItem(key);
  if (!raw) return false;
  try {
    const data = JSON.parse(raw);
    let count = 0;
    data.forEach((arr, i) => {
      if (!pages[i]) return;
      pages[i].strokes = arr.map(s => ({
        eraser: !!s.e, color: s.c, width: s.w, type: s.t || 'free', points: s.p
      }));
      count += arr.length;
    });
    return count > 0;
  } catch (e) { return false; }
}

/* ============ PDF読み込み ============ */
document.getElementById('openBtn').onclick = () => fileInput.click();
document.getElementById('bigOpen').onclick = () => fileInput.click();

fileInput.onchange = async () => {
  const file = fileInput.files[0];
  fileInput.value = '';
  if (!file) return;
  try {
    await loadPdf(file);
  } catch (e) {
    console.error(e);
    toast('PDFを開けませんでした');
  }
};

async function loadPdf(file) {
  toast('読み込み中…', 8000);
  const buf = await file.arrayBuffer();
  originalBytes = new Uint8Array(buf);
  // pdf.jsにはコピーを渡す（workerに転送されるため）
  pdfDoc = await pdfjsLib.getDocument({ data: originalBytes.slice() }).promise;
  currentFile = file;
  document.getElementById('fileName').textContent = file.name;

  viewer.innerHTML = '';
  pages = [];
  undoStack = [];

  for (let n = 1; n <= pdfDoc.numPages; n++) {
    const page = await pdfDoc.getPage(n);
    const vp1 = page.getViewport({ scale: 1 });
    const wrap = document.createElement('div');
    wrap.className = 'page-wrap';
    const pdfCanvas = document.createElement('canvas');
    const annCanvas = document.createElement('canvas');
    annCanvas.className = 'ann-canvas' + (fingerDraw ? ' finger-draw' : '');
    wrap.appendChild(pdfCanvas);
    wrap.appendChild(annCanvas);
    viewer.appendChild(wrap);
    const p = { num: n, page, baseW: vp1.width, baseH: vp1.height,
                view: page.view.slice(),        // 表示領域 [x1,y1,x2,y2]（PDF内部座標）
                rotate: ((page.rotate % 360) + 360) % 360, // ページの回転指定
                wrap, pdfCanvas, annCanvas, strokes: [] };
    pages.push(p);
    attachDrawing(p);
  }

  // 横幅にフィット
  const avail = viewer.clientWidth - 24;
  scale = Math.min(2, Math.max(0.3, avail / pages[0].baseW));

  const restored = restoreStrokes();
  lastFitW = viewer.clientWidth;
  layoutAll();
  updatePageInfo();
  toast(restored ? '前回のメモを復元しました' : 'PDFを開きました');
}

/* ============ 描画（レンダリング） ============ */
// iPadのSafariはcanvasの合計メモリに上限があり、全ページ分を一度に確保すると
// 数秒後に描画が破棄されて真っ白になる。画面付近のページだけcanvasを確保し、
// 離れたページは解放する。
const DPR_CAP = 2;
function getDpr() { return Math.min(window.devicePixelRatio || 1, DPR_CAP); }

function layoutAll() {
  for (const p of pages) {
    const vp = p.page.getViewport({ scale });
    p.cssW = Math.floor(vp.width);
    p.cssH = Math.floor(vp.height);
    p.wrap.style.width = p.cssW + 'px';
    p.wrap.style.height = p.cssH + 'px';
    for (const c of [p.pdfCanvas, p.annCanvas]) {
      c.style.width = p.cssW + 'px';
      c.style.height = p.cssH + 'px';
    }
    p.renderedScale = null;
    if (p.renderTask) { try { p.renderTask.cancel(); } catch (e) {} p.renderTask = null; }
  }
  updateVisible();
}

function freePage(p) {
  if (p.renderTask) { try { p.renderTask.cancel(); } catch (e) {} p.renderTask = null; }
  p.pdfCanvas.width = p.pdfCanvas.height = 0;
  p.annCanvas.width = p.annCanvas.height = 0;
  p.renderedScale = null;
}

async function renderPage(p) {
  if (p.renderedScale === scale || p.rendering) return;
  p.rendering = true;
  const d = getDpr();
  const renderScale = scale;
  p.pdfCanvas.width = Math.floor(p.cssW * d);
  p.pdfCanvas.height = Math.floor(p.cssH * d);
  p.annCanvas.width = Math.floor(p.cssW * d);
  p.annCanvas.height = Math.floor(p.cssH * d);
  const ctx = p.pdfCanvas.getContext('2d');
  ctx.setTransform(d, 0, 0, d, 0, 0);
  try {
    p.renderTask = p.page.render({
      canvasContext: ctx,
      viewport: p.page.getViewport({ scale: renderScale })
    });
    await p.renderTask.promise;
    p.renderedScale = renderScale;
  } catch (e) { /* キャンセルは無視 */ }
  p.renderTask = null;
  p.rendering = false;
  redrawAnnotations(p);
  // 描画中にズームが変わっていたら描き直す
  if (p.visible && p.renderedScale !== scale) renderPage(p);
}

let visiblePending = false;
function updateVisible() {
  if (visiblePending) return;
  visiblePending = true;
  requestAnimationFrame(() => {
    visiblePending = false;
    if (!pages.length) return;
    const top = viewer.scrollTop, h = viewer.clientHeight;
    const lo = top - h, hi = top + h * 2;
    for (const p of pages) {
      const pTop = p.wrap.offsetTop, pBot = pTop + p.wrap.offsetHeight;
      p.visible = pBot > lo && pTop < hi;
      if (p.visible) renderPage(p);
      else if (p.pdfCanvas.width || p.rendering) freePage(p);
    }
  });
}

function strokeStyle(ctx, s, k) {
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  if (s.eraser) {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.strokeStyle = 'rgba(0,0,0,1)';
    ctx.lineWidth = s.width * k;
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = s.color;
    ctx.lineWidth = s.width * k;
  }
}

function drawStroke(ctx, s, k) {
  // 四角（面の塗りつぶし）: points[0]とpoints[1]を対角とする長方形
  if (s.type === 'rect') {
    const [a, b] = s.points;
    if (!b) return;
    ctx.globalCompositeOperation = s.eraser ? 'destination-out' : 'source-over';
    ctx.fillStyle = s.eraser ? 'rgba(0,0,0,1)' : s.color;
    ctx.fillRect(Math.min(a[0], b[0]) * k, Math.min(a[1], b[1]) * k,
                 Math.abs(b[0] - a[0]) * k, Math.abs(b[1] - a[1]) * k);
    ctx.globalCompositeOperation = 'source-over';
    return;
  }
  // 自由・直線: 折れ線として描く（直線は2点だけの折れ線）
  strokeStyle(ctx, s, k);
  const pts = s.points;
  if (!pts.length) return;
  ctx.beginPath();
  ctx.moveTo(pts[0][0] * k, pts[0][1] * k);
  if (pts.length === 1) {
    ctx.lineTo(pts[0][0] * k + 0.01, pts[0][1] * k);
  } else {
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0] * k, pts[i][1] * k);
  }
  ctx.stroke();
  ctx.globalCompositeOperation = 'source-over';
}

function redrawAnnotations(p) {
  if (!p.annCanvas.width) return; // 解放中のページは次の表示時に描き直される
  const d = getDpr();
  const ctx = p.annCanvas.getContext('2d');
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, p.annCanvas.width, p.annCanvas.height);
  ctx.setTransform(d, 0, 0, d, 0, 0);
  for (const s of p.strokes) drawStroke(ctx, s, scale);
}

/* ============ 手書き入力 ============ */
function attachDrawing(p) {
  const c = p.annCanvas;
  let drawing = null; // {stroke, last}

  // Apple Pencilでのスクロールを防ぐ（指は通す）
  const blockStylus = e => {
    let block = fingerDraw;
    for (const t of e.touches) {
      if (t.touchType === 'stylus') block = true;
    }
    if (block) e.preventDefault();
  };
  c.addEventListener('touchstart', blockStylus, { passive: false });
  c.addEventListener('touchmove', blockStylus, { passive: false });

  function pos(e) {
    const r = c.getBoundingClientRect();
    return [(e.clientX - r.left) / scale, (e.clientY - r.top) / scale];
  }

  function shouldDraw(e) {
    if (e.pointerType === 'pen') return true;
    if (e.pointerType === 'mouse') return e.buttons === 1 || e.type === 'pointerdown';
    if (e.pointerType === 'touch') return fingerDraw;
    return false;
  }

  c.addEventListener('pointerdown', e => {
    if (!shouldDraw(e)) return;
    e.preventDefault();
    c.setPointerCapture(e.pointerId);
    const width = tool.eraser ? 18 : tool.width;
    const stroke = { type: tool.mode, eraser: tool.eraser, color: tool.color,
                     width, points: [pos(e)] };
    drawing = { stroke, moved: false };
    const d = getDpr();
    const ctx = c.getContext('2d');
    ctx.setTransform(d, 0, 0, d, 0, 0);
    if (stroke.type === 'free') drawStroke(ctx, stroke, scale);
  });

  c.addEventListener('pointermove', e => {
    if (!drawing) return;
    e.preventDefault();
    const ctx = c.getContext('2d');
    const stroke = drawing.stroke;

    if (stroke.type === 'free') {
      const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
      strokeStyle(ctx, stroke, scale);
      for (const ev of events) {
        const pt = pos(ev);
        const pts = stroke.points;
        const last = pts[pts.length - 1];
        if (Math.abs(pt[0] - last[0]) < 0.3 && Math.abs(pt[1] - last[1]) < 0.3) continue;
        pts.push(pt);
        ctx.beginPath();
        ctx.moveTo(last[0] * scale, last[1] * scale);
        ctx.lineTo(pt[0] * scale, pt[1] * scale);
        ctx.stroke();
      }
      ctx.globalCompositeOperation = 'source-over';
    } else {
      // 直線・四角: 始点〜現在位置のプレビューを描き直す
      stroke.points[1] = pos(e);
      drawing.moved = true;
      redrawAnnotations(p);
      const d = getDpr();
      ctx.setTransform(d, 0, 0, d, 0, 0);
      drawStroke(ctx, stroke, scale);
    }
  });

  const finish = e => {
    if (!drawing) return;
    const { stroke, moved } = drawing;
    drawing = null;
    // 直線・四角はドラッグせずタップしただけなら何も描かない
    if (stroke.type !== 'free' && !moved) { redrawAnnotations(p); return; }
    p.strokes.push(stroke);
    undoStack.push({ page: p, stroke });
    autoSave();
  };
  c.addEventListener('pointerup', finish);
  c.addEventListener('pointercancel', finish);
}

/* ============ ツール選択 ============ */
const colorBtns = [...document.querySelectorAll('.color-btn')];
const widthBtns = [...document.querySelectorAll('.width-btn')];
const modeBtns = [...document.querySelectorAll('.mode-btn')];
const eraserBtn = document.getElementById('eraserBtn');

modeBtns.forEach(b => b.onclick = () => {
  tool.mode = b.dataset.mode;
  modeBtns.forEach(x => x.classList.toggle('active', x === b));
});

colorBtns.forEach(b => b.onclick = () => {
  tool.eraser = false;
  tool.color = b.dataset.color;
  colorBtns.forEach(x => x.classList.toggle('active', x === b));
  eraserBtn.classList.remove('active');
});
widthBtns.forEach(b => b.onclick = () => {
  tool.width = parseFloat(b.dataset.width);
  widthBtns.forEach(x => x.classList.toggle('active', x === b));
});
eraserBtn.onclick = () => {
  tool.eraser = !tool.eraser;
  eraserBtn.classList.toggle('active', tool.eraser);
  if (tool.eraser) colorBtns.forEach(x => x.classList.remove('active'));
  else colorBtns.find(x => x.dataset.color === tool.color).classList.add('active');
};

document.getElementById('fingerDraw').onchange = e => {
  fingerDraw = e.target.checked;
  pages.forEach(p => p.annCanvas.classList.toggle('finger-draw', fingerDraw));
  toast(fingerDraw ? '指でも書けます（スクロールは画面端で）' : '指はスクロールに戻りました');
};

/* ============ Undo / ページ消去 ============ */
document.getElementById('undoBtn').onclick = () => {
  const last = undoStack.pop();
  if (!last) { toast('戻す操作がありません'); return; }
  const i = last.page.strokes.indexOf(last.stroke);
  if (i >= 0) last.page.strokes.splice(i, 1);
  redrawAnnotations(last.page);
  autoSave();
};

function currentPage() {
  if (!pages.length) return null;
  const mid = viewer.scrollTop + viewer.clientHeight / 2;
  let best = pages[0], bestD = Infinity;
  for (const p of pages) {
    const center = p.wrap.offsetTop + p.wrap.offsetHeight / 2;
    const d = Math.abs(center - mid);
    if (d < bestD) { bestD = d; best = p; }
  }
  return best;
}

document.getElementById('clearBtn').onclick = () => {
  const p = currentPage();
  if (!p || !p.strokes.length) { toast('このページにメモはありません'); return; }
  if (!confirm(`${p.num}ページのメモをすべて消しますか？`)) return;
  undoStack = undoStack.filter(u => u.page !== p);
  p.strokes = [];
  redrawAnnotations(p);
  autoSave();
};

/* ============ ズーム・ページ表示 ============ */
document.getElementById('zoomIn').onclick = () => setZoom(scale * 1.25);
document.getElementById('zoomOut').onclick = () => setZoom(scale / 1.25);

function setZoom(s) {
  if (!pdfDoc) return;
  scale = Math.min(4, Math.max(0.3, s));
  layoutAll();
}

viewer.addEventListener('scroll', () => { updatePageInfo(); updateVisible(); });
function updatePageInfo() {
  const p = currentPage();
  pageInfo.textContent = p ? `${p.num} / ${pages.length}` : '';
}

/* ============ 保存（メモ入りPDF） ============ */
// 元のPDFファイルは変更しない。メモを焼き込んだ「別名のコピー」を作り、
// iPadでは共有シート（ファイルに保存）で保存先を選んでもらう。
function exportName(label) {
  const d = new Date();
  const z = n => String(n).padStart(2, '0');
  const stamp = `${d.getFullYear()}${z(d.getMonth() + 1)}${z(d.getDate())}_${z(d.getHours())}${z(d.getMinutes())}`;
  return currentFile.name.replace(/\.pdf$/i, '') + `_${label}_${stamp}.pdf`;
}

// 通常保存: 元のPDFにメモ画像を重ねる（文字データはそのまま残る）
async function buildNormalPdf() {
  const doc = await PDFLib.PDFDocument.load(originalBytes);
  const pdfPages = doc.getPages();
  const EXPORT_SCALE = 2; // 書き込みの画質

  for (let i = 0; i < pages.length && i < pdfPages.length; i++) {
    const p = pages[i];
    if (!p.strokes.length) continue;
    const target = pdfPages[i];

    const off = document.createElement('canvas');
    off.width = Math.round(p.baseW * EXPORT_SCALE);
    off.height = Math.round(p.baseH * EXPORT_SCALE);
    const ctx = off.getContext('2d');
    ctx.setTransform(EXPORT_SCALE, 0, 0, EXPORT_SCALE, 0, 0);
    for (const s of p.strokes) drawStroke(ctx, s, 1);

    const dataUrl = off.toDataURL('image/png');
    // iPadはcanvasの合計メモリに上限があるため、使い終わった作業用canvasは
    // すぐ解放する（放置すると画面表示側のcanvasが破棄されて崩れる）
    off.width = 0; off.height = 0;
    const png = await doc.embedPng(dataUrl);

    // 画面表示（pdf.js）は「ページの回転指定」と「表示領域の原点」を反映した
    // 向きで見えているが、pdf-libの貼り付けは回転前の内部座標で行われる。
    // 表示上の位置と一致するように、回転角ごとに貼り付け位置・向きを変換する。
    const x0 = p.view[0], y0 = p.view[1];
    const w = p.view[2] - p.view[0], h = p.view[3] - p.view[1];
    const opts =
      p.rotate === 90  ? { x: x0 + w, y: y0,     width: h, height: w, rotate: PDFLib.degrees(90) } :
      p.rotate === 180 ? { x: x0 + w, y: y0 + h, width: w, height: h, rotate: PDFLib.degrees(180) } :
      p.rotate === 270 ? { x: x0,     y: y0 + h, width: h, height: w, rotate: PDFLib.degrees(270) } :
                         { x: x0,     y: y0,     width: w, height: h };
    target.drawImage(png, opts);
  }
  return doc.save();
}

// 完全塗りつぶし保存: 全ページを「見たまま」の画像に変換して新しいPDFを作る。
// 元の文字データは一切引き継がれないので、塗りつぶした情報は完全に消える。
async function buildFlatPdf() {
  const doc = await PDFLib.PDFDocument.create();
  const FLAT_SCALE = 2; // 画像化の解像度

  for (const p of pages) {
    const off = document.createElement('canvas');
    off.width = Math.round(p.baseW * FLAT_SCALE);
    off.height = Math.round(p.baseH * FLAT_SCALE);
    const ctx = off.getContext('2d');

    // 背景を白で塗ってからページを描画（透明部分が黒くならないように）
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, off.width, off.height);
    await p.page.render({
      canvasContext: ctx,
      viewport: p.page.getViewport({ scale: FLAT_SCALE })
    }).promise;

    // メモを上に描く
    ctx.setTransform(FLAT_SCALE, 0, 0, FLAT_SCALE, 0, 0);
    for (const s of p.strokes) drawStroke(ctx, s, 1);

    const dataUrl = off.toDataURL('image/jpeg', 0.85);
    off.width = 0; off.height = 0; // canvasメモリをすぐ解放

    const jpg = await doc.embedJpg(dataUrl);
    const page = doc.addPage([p.baseW, p.baseH]);
    page.drawImage(jpg, { x: 0, y: 0, width: p.baseW, height: p.baseH });
  }
  return doc.save();
}

async function deliverPdf(bytes, name) {
  const blob = new Blob([bytes], { type: 'application/pdf' });
  const file = new File([bytes], name, { type: 'application/pdf' });

  // iPad/iPhone：共有シートで「ファイルに保存」→ 保存先と名前を選べる
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: name });
      toast('保存しました（元のPDFはそのままです）');
    } catch (e) {
      if (e.name === 'AbortError') toast('保存をキャンセルしました');
      else throw e;
    }
  } else {
    // パソコンのブラウザ等：従来通りダウンロード
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 10000);
    toast('保存しました（ダウンロードに保存されます）');
  }
}

const saveModal = document.getElementById('saveModal');
document.getElementById('saveBtn').onclick = () => {
  if (!pdfDoc) { toast('先にPDFを開いてください'); return; }
  saveModal.classList.add('show');
};
document.getElementById('saveCancel').onclick = () => saveModal.classList.remove('show');
saveModal.addEventListener('click', e => {
  if (e.target === saveModal) saveModal.classList.remove('show');
});
document.getElementById('saveNormal').onclick = () => doSave('normal');
document.getElementById('saveFlat').onclick = () => doSave('flat');

async function doSave(kind) {
  saveModal.classList.remove('show');
  toast(kind === 'flat' ? '画像に変換して作成中…（ページ数によって時間がかかります）' : 'PDFを作成中…', 20000);
  try {
    const bytes = kind === 'flat' ? await buildFlatPdf() : await buildNormalPdf();
    await deliverPdf(bytes, exportName(kind === 'flat' ? '塗りつぶし済' : 'メモ'));
  } catch (e) {
    console.error(e);
    toast('保存に失敗しました：' + e.message, 4000);
  } finally {
    // 保存処理でcanvasメモリを使った後、表示が破棄されていることがあるので
    // 画面付近のページを描き直す
    pages.forEach(p => { p.renderedScale = null; });
    updateVisible();
  }
}

/* 画面回転などで幅が変わったら再フィット。
   iPadはスクロール中のアドレスバー伸縮でもresizeが飛ぶため、
   幅が実際に変わったときだけ再描画する */
let resizeTimer = null;
let lastFitW = 0;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (!pdfDoc) return;
    const w = viewer.clientWidth;
    if (Math.abs(w - lastFitW) < 4) return;
    lastFitW = w;
    setZoom(Math.min(2, Math.max(0.3, (w - 24) / pages[0].baseW)));
  }, 300);
});
</script>
